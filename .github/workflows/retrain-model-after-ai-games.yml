name: Retrain Chess VGG After AI Games

on:
  workflow_run:
    workflows: ["Run AI Games Daily"]
    types: [completed]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain-model:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch tabulate scikit-learn matplotlib pandas numpy

      - name: Retrain model on latest chess_games_final_2.csv
        env:
          HEADLESS: "1"
        run: python Test_Model.py

      - name: Commit retrained artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chess_vgg_model_final_Test.pth training_metrics_Test.png chess_predictions_improved_Test.csv || true
          if git diff --cached --quiet; then
            echo "No retraining artifact changes to commit."
          else
            git commit -m "chore: retrain chess_vgg_model_test after daily AI games"
            git push origin main
          fi
